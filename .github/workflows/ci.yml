name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

  web:
    name: Dashboard build and E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dashboard dependencies
        run: npm --prefix web ci

      - name: Install Playwright browser
        run: npm --prefix web exec -- playwright install --with-deps chromium webkit

      - name: Build dashboard
        run: npm --prefix web run build

      - name: Run dashboard E2E
        env:
          DOGTAP_E2E_BASE_URL: http://127.0.0.1:4175
        run: |
          set -euo pipefail
          npm --prefix web run preview -- --host 127.0.0.1 --port 4175 > /tmp/dogtap-vite-preview.log 2>&1 &
          preview_pid="$!"
          trap 'kill "${preview_pid}" >/dev/null 2>&1 || true' EXIT

          for _ in $(seq 1 60); do
            if curl -fsS "${DOGTAP_E2E_BASE_URL}" >/dev/null 2>&1; then
              break
            fi
            if ! kill -0 "${preview_pid}" >/dev/null 2>&1; then
              cat /tmp/dogtap-vite-preview.log
              exit 1
            fi
            sleep 0.5
          done

          curl -fsS "${DOGTAP_E2E_BASE_URL}" >/dev/null
          npm --prefix web run test:e2e

  smoke:
    name: CLI and adoption smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dashboard dependencies
        run: npm --prefix web ci

      - name: Install Playwright browser
        run: npm --prefix web exec -- playwright install --with-deps chromium

      - name: Check shell syntax
        run: make shell-check

      - name: Check docs/spec alignment
        run: make doc-check

      - name: Check workflow contracts
        run: make contract-check

      - name: Run generic adoption smoke
        env:
          DOGTAP_ARTIFACT_DIR: .dogtap/diagnostics/generic
        run: make smoke-adoption

      - name: Run external injection smoke
        env:
          DOGTAP_ARTIFACT_DIR: .dogtap/diagnostics/external-injection
        run: make smoke-external-injection

      - name: Run Faro SDK smoke
        env:
          DOGTAP_ARTIFACT_DIR: .dogtap/diagnostics/faro
        run: make smoke-faro

      - name: Upload smoke diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dogtap-smoke-diagnostics
          path: .dogtap/diagnostics/**
          if-no-files-found: ignore

  demo:
    name: Demo visual check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dashboard dependencies
        run: npm --prefix web ci

      - name: Install Playwright browser
        run: npm --prefix web exec -- playwright install --with-deps chromium webkit

      - name: Run live demo visual check
        env:
          DOGTAP_ARTIFACT_DIR: .dogtap/diagnostics/demo
        run: make demo-visual-check

      - name: Upload demo screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dogtap-demo-screenshots
          path: web/test-results/**/*.png
          if-no-files-found: ignore

      - name: Upload demo diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dogtap-demo-diagnostics
          path: .dogtap/diagnostics/demo/**
          if-no-files-found: ignore

  container:
    name: Container build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t dogtap:ci .
