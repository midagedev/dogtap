services:
  backend:
    image: node:24-alpine
    working_dir: /app
    command: ["node", "server.mjs"]
    environment:
      PORT: "3001"
      SERVICE_NAME: external-smoke-backend
      ENVIRONMENT: ci
      VERSION: base
    volumes:
      - ./backend:/app:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 2s
      timeout: 2s
      retries: 30

  frontend:
    image: node:24-alpine
    working_dir: /app
    command: ["node", "server.mjs"]
    environment:
      PORT: "3000"
      SERVICE_NAME: external-smoke-frontend
      ENVIRONMENT: ci
      VERSION: base
      BACKEND_URL: http://backend:3001
    volumes:
      - ./frontend:/app:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 2s
      timeout: 2s
      retries: 30
