apiVersion: apps/v1
kind: Deployment
metadata:
  name: dogtap
  namespace: dogtap-dev
  labels:
    app.kubernetes.io/name: dogtap
    app.kubernetes.io/part-of: dogtap
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: dogtap
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dogtap
        app.kubernetes.io/part-of: dogtap
      annotations:
        dogtap.warning.private-network: "Keep Dogtap private; use port-forward, VPN, or internal ingress only."
        dogtap.warning.retention: "DOGTAP_STORAGE_MAX_EVENTS and DOGTAP_STORAGE_TTL bound retained telemetry."
        dogtap.warning.raw-payloads: "DOGTAP_ALLOW_RAW_PAYLOADS must stay false outside local-only debugging."
        dogtap.warning.forwarding: "DOGTAP_FORWARDING_ENABLED is false by default; use managed secrets for approved forwarding trials."
    spec:
      serviceAccountName: dogtap
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dogtap
          image: ghcr.io/midagedev/dogtap:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
            - name: apm
              containerPort: 8126
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          env:
            - name: DOGTAP_MODE
              value: tee
            - name: DOGTAP_HTTP_ADDR
              value: 0.0.0.0:8080
            - name: DOGTAP_APM_ADDR
              value: 0.0.0.0:8126
            - name: DOGTAP_OTLP_HTTP_ADDR
              value: 0.0.0.0:4318
            - name: DOGTAP_GRPC_ADDR
              value: 0.0.0.0:4317
            - name: DOGTAP_STORAGE_KIND
              value: sqlite
            - name: DOGTAP_STORAGE_PATH
              value: /data/dogtap.db
            - name: DOGTAP_STORAGE_MAX_EVENTS
              value: "5000"
            - name: DOGTAP_STORAGE_TTL
              value: 4h
            - name: DOGTAP_SAMPLING_RATE
              value: "1.0"
            - name: DOGTAP_QUEUE_MAX_IN_FLIGHT
              value: "100"
            - name: DOGTAP_BACKPRESSURE_POLICY
              value: drop-newest
            - name: DOGTAP_ALLOW_RAW_PAYLOADS
              value: "false"
            - name: DOGTAP_FORWARDING_ENABLED
              value: "false"
            - name: DOGTAP_FORWARDING_MAX_ATTEMPTS
              value: "1"
            - name: DOGTAP_FORWARDING_TIMEOUT
              value: 5s
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dogtap-data
        - name: tmp
          emptyDir: {}
